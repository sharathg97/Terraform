trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  terraformVersion: '1.6.6'

  backendServiceArm: 'azure-sp-connection'

  backendAzureRmResourceGroupName: 'tfstate-rg'
  backendAzureRmStorageAccountName: 'sharathtfstate123'
  backendAzureRmContainerName: 'tfstate'
  backendAzureRmKey: 'acr.terraform.tfstate'

  workingDirectory: '$(System.DefaultWorkingDirectory)'

stages:

# =========================
# TERRAFORM VALIDATE STAGE
# =========================

- stage: TerraformValidate
  displayName: Terraform Validate

  jobs:
  - job: Validate
    displayName: Validate Terraform

    steps:

    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)

    - task: TerraformTaskV4@4
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'

        backendServiceArm: $(backendServiceArm)

        backendAzureRmResourceGroupName: $(backendAzureRmResourceGroupName)
        backendAzureRmStorageAccountName: $(backendAzureRmStorageAccountName)
        backendAzureRmContainerName: $(backendAzureRmContainerName)
        backendAzureRmKey: $(backendAzureRmKey)

        workingDirectory: $(workingDirectory)

    - task: TerraformTaskV4@4
      displayName: Terraform Validate
      inputs:
        provider: 'azurerm'
        command: 'validate'
        workingDirectory: $(workingDirectory)

# =========================
# TERRAFORM PLAN STAGE
# =========================

- stage: TerraformPlan
  displayName: Terraform Plan

  dependsOn: TerraformValidate

  jobs:
  - job: Plan
    displayName: Terraform Plan

    steps:

    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)

    - task: TerraformTaskV4@4
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'

        backendServiceArm: $(backendServiceArm)

        backendAzureRmResourceGroupName: $(backendAzureRmResourceGroupName)
        backendAzureRmStorageAccountName: $(backendAzureRmStorageAccountName)
        backendAzureRmContainerName: $(backendAzureRmContainerName)
        backendAzureRmKey: $(backendAzureRmKey)

        workingDirectory: $(workingDirectory)

    - task: TerraformTaskV4@4
      displayName: Terraform Plan
      inputs:
        provider: 'azurerm'
        command: 'plan'

        environmentServiceNameAzureRM: $(backendServiceArm)

        workingDirectory: $(workingDirectory)

# =========================
# APPROVAL STAGE
# =========================

- stage: Approval
  displayName: Manual Approval

  dependsOn: TerraformPlan

  jobs:
  - job: WaitForApproval
    pool: server

    steps:
    - task: ManualValidation@0
      timeoutInMinutes: 60

      inputs:
        notifyUsers: ''
        instructions: 'Please validate Terraform plan before apply'
        onTimeout: 'reject'

# =========================
# TERRAFORM APPLY STAGE
# =========================

- stage: TerraformApply
  displayName: Terraform Apply

  dependsOn: Approval

  jobs:
  - job: Apply
    displayName: Apply Terraform

    steps:

    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)

    - task: TerraformTaskV4@4
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'

        backendServiceArm: $(backendServiceArm)

        backendAzureRmResourceGroupName: $(backendAzureRmResourceGroupName)
        backendAzureRmStorageAccountName: $(backendAzureRmStorageAccountName)
        backendAzureRmContainerName: $(backendAzureRmContainerName)
        backendAzureRmKey: $(backendAzureRmKey)

        workingDirectory: $(workingDirectory)

    - task: TerraformTaskV4@4
      displayName: Terraform Apply
      inputs:
        provider: 'azurerm'
        command: 'apply'

        environmentServiceNameAzureRM: $(backendServiceArm)

        workingDirectory: $(workingDirectory)

        commandOptions: '-auto-approve'
